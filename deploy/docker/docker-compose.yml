services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://lanyard:lanyard@postgres:5432/lanyard
      BETTER_AUTH_SECRET: CHANGEMEPLEASE2a6e5e19a90c0c380ab7ceffde4ddac9de5e0607ed3dcdfbf6e688e3e6ecc012
      BETTER_AUTH_URL: http://localhost:3000
      APP_NAME: Lanyard
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: lanyard
      POSTGRES_USER: lanyard
      POSTGRES_PASSWORD: lanyard
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanyard -d lanyard"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
