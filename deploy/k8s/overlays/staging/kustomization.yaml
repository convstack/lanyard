apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: lanyard
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Ingress
      name: lanyard
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: id-staging.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: id-staging.example.com
  - target:
      kind: HorizontalPodAutoscaler
      name: lanyard
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
