apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lanyard
  namespace: lanyard
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - id.example.com
      secretName: lanyard-tls
  rules:
    - host: id.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lanyard
                port:
                  number: 3000
